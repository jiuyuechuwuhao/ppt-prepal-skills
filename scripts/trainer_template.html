<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
:root {
  --bg: #0d1117;
  --card-bg: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent-dim: #1f6feb33;
  --highlight: #d2a8ff;
  --highlight-bg: #d2a8ff22;
  --playing-bg: #1f6feb11;
  --radius: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Global controls bar */
.controls-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  justify-content: space-between;
  flex-wrap: wrap;
}

.controls-bar h1 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
}

.speed-control {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: var(--text-dim);
}

.speed-control input[type="range"] {
  width: 120px;
  accent-color: var(--accent);
}

.speed-control .speed-val {
  min-width: 40px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  font-weight: 600;
}

.nav-buttons {
  display: flex;
  gap: 6px;
}

.nav-buttons button {
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: var(--radius);
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.15s;
}
.nav-buttons button:hover {
  background: var(--border);
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 16px 20px 60px;
}

/* Slide card */
.slide-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.slide-card.playing {
  border-color: var(--accent);
  background: var(--playing-bg);
}

.slide-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}
.slide-header:hover {
  background: rgba(255,255,255,0.03);
}

.slide-num {
  background: var(--accent-dim);
  color: var(--accent);
  min-width: 36px;
  height: 36px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
}

.slide-title {
  flex: 1;
  font-size: 0.9rem;
  font-weight: 500;
}

.slide-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn-play {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 5px 14px;
  border-radius: var(--radius);
  font-size: 0.8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: opacity 0.15s;
}
.btn-play:hover { opacity: 0.85; }
.btn-play.playing {
  background: #da3633;
}
.btn-play svg { width: 14px; height: 14px; }

.chevron {
  color: var(--text-dim);
  font-size: 0.7rem;
  transition: transform 0.2s;
  width: 20px;
  text-align: center;
}
.slide-card.expanded .chevron {
  transform: rotate(90deg);
}

/* Slide body */
.slide-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
}
.slide-card.expanded .slide-body {
  display: block;
}

/* PPT preview placeholder */
.ppt-preview {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0;
  text-align: center;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin: 12px 0 16px;
  position: relative;
  overflow: hidden;
  line-height: 0;
}
.ppt-preview img {
  display: block;
  width: 100%;
}
.ppt-preview .label {
  position: absolute;
  top: 6px;
  left: 12px;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  background: rgba(13,17,23,0.8);
  padding: 2px 8px;
  border-radius: 3px;
  z-index: 1;
}
.ppt-preview .label {
  position: absolute;
  top: 8px;
  left: 12px;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dim);
}

/* Beat table */
.beats-section {
  margin-bottom: 12px;
}
.beats-section h3 {
  font-size: 0.8rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  font-weight: 600;
}

.beat-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}
.beat-table th {
  text-align: left;
  padding: 6px 8px;
  color: var(--text-dim);
  font-weight: 500;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
}
.beat-table td {
  padding: 5px 8px;
  border-bottom: 1px solid rgba(48,54,61,0.4);
  vertical-align: top;
}
.beat-table .beat-num {
  color: var(--text-dim);
  width: 32px;
  font-variant-numeric: tabular-nums;
}
.beat-table .beat-english {
  color: var(--text);
  font-weight: 500;
}
.beat-table .beat-action {
  color: var(--text-dim);
  font-size: 0.78rem;
  font-style: italic;
}
.beat-table td.beat-ppt {
  color: var(--text-dim);
  font-size: 0.78rem;
}

/* Flowing full text */
.flow-section {
  margin-top: 12px;
}
.flow-section h3 {
  font-size: 0.8rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
  font-weight: 600;
}

.flow-text {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  font-size: 1.05rem;
  line-height: 2;
  letter-spacing: 0.01em;
}

.flow-text .sentence {
  padding: 3px 6px;
  border-radius: 3px;
  transition: background 0.15s, color 0.15s;
  margin: 0 1px;
}
.flow-text .sentence.active {
  background: var(--highlight-bg);
  color: var(--highlight);
  font-weight: 500;
}

/* Loading / empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}


.voice-control {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.85rem;
  color: var(--text-dim);
}
.voice-control select {
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: var(--radius);
  font-size: 0.8rem;
  cursor: pointer;
}
.voice-control select:focus {
  outline: none;
  border-color: var(--accent);
}

/* Responsive */
@media (max-width: 600px) {
  .controls-bar {
    padding: 8px 14px;
    gap: 10px;
  }
  .controls-bar h1 { font-size: 0.85rem; }
  .beat-table { font-size: 0.75rem; }
  .beat-table th, .beat-table td { padding: 4px 5px; }
  .flow-text { font-size: 0.95rem; padding: 10px 12px; }
}
</style>
</head>
<body>

<div class="controls-bar">
  <h1>&#x1F47D; Disclosure Day · 带读训练</h1>
  <div class="speed-control">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="10" y1="15" x2="10" y2="9"/><line x1="14" y1="15" x2="14" y2="9"/></svg>
    <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.05" value="1.0">
    <span class="speed-val" id="speedLabel">1.0x</span>
  </div>
  <div class="voice-control" id="voiceControl" style="display:none">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    <select id="voiceSelector">
      <option value="">Default</option>
    </select>
  </div>
  <div class="nav-buttons">
    <button onclick="collapseAll()">Fold All</button>
    <button onclick="expandAll()">Unfold All</button>
  </div>
</div>

<div class="container" id="container">
</div>

<script>
// Slide data
const SLIDES = [];

// AUDIO_BASE handled by getAudioBase() for multi-voice support
let currentAudio = null;
let currentSlide = null;
let playbackRate = 1.0;

// Build page
function buildPage() {
  const container = document.getElementById('container');
  container.innerHTML = SLIDES.map((s, i) => `
    <div class="slide-card" id="slide-${s.num}" onclick="toggleSlide(event, ${s.num})">
      <div class="slide-header">
        <span class="slide-num">${String(s.num).padStart(2,'0')}</span>
        <span class="slide-title">${escHtml(s.title)}</span>
        <div class="slide-actions" onclick="event.stopPropagation()">
          <button class="btn-play" id="play-btn-${s.num}" onclick="togglePlay(${s.num})" title="Play / Pause">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            Play
          </button>
        </div>
        <span class="chevron">&#9654;</span>
      </div>
      <div class="slide-body">
        <div class="ppt-preview">
          <span class="label">PPT Preview</span>
          <img src="slides/Slide${String(s.num).padStart(2,'0')}.jpg" 
               alt="Slide ${s.num}" loading="lazy" 
               style="width:100%;max-width:100%;border-radius:4px"
               onerror="this.style.display=\'none\'" >
        </div>
        <div class="beats-section">
          <h3>&#x1F3AC; Beat-by-Beat Script</h3>
          <table class="beat-table">
            <thead><tr><th>#</th><th>PPT Guide</th><th>English</th><th>Action</th></tr></thead>
            <tbody>
              ${s.beats.map(b => `
                <tr>
                  <td class="beat-num">${b.beat}</td>
                  <td class="beat-ppt">${escHtml(b.ppt_guide)}</td>
                  <td class="beat-english">${escHtml(b.english)}</td>
                  <td class="beat-action">${escHtml(b.action)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <div class="flow-section">
          <h3>&#x1F399; Flowing Full Text</h3>
          <div class="flow-text" id="flow-${s.num}">
            ${makeSentences(s.full_text, s.num)}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function makeSentences(text, slideNum) {
  if (!text) return '';
  // Split into sentences, keeping punctuation
  const parts = text.match(/[^.!?]+[.!?]*\s*/g) || [text];
  return parts.map((p, i) => {
    const trimmed = p.trim();
    if (!trimmed) return '';
    return `<span class="sentence" id="sent-${slideNum}-${i}" data-slide="${slideNum}" data-idx="${i}">${escHtml(trimmed)}</span> `;
  }).join('');
}

function escHtml(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// Toggle slide expand/collapse
function toggleSlide(e, num) {
  // Only toggle if clicking the header itself, not buttons inside
  const card = document.getElementById('slide-' + num);
  card.classList.toggle('expanded');
}

function collapseAll() {
  document.querySelectorAll('.slide-card').forEach(c => c.classList.remove('expanded'));
}
function expandAll() {
  document.querySelectorAll('.slide-card').forEach(c => c.classList.add('expanded'));
}

// Playback
// Highlight tracking
let highlightRAF = null;
let sentenceMap = {};  // slideNum -> [{el, charStart, charEnd, charLen}]

function buildSentenceMap(num) {
  if (sentenceMap[num]) return sentenceMap[num];
  const container = document.getElementById('flow-' + num);
  if (!container) return [];
  const spans = container.querySelectorAll('.sentence');
  let charPos = 0;
  const map = [];
  spans.forEach(span => {
    const text = span.textContent.trim();
    const len = text.length;
    map.push({ el: span, charStart: charPos, charEnd: charPos + len, charLen: len });
    charPos += len + 1; // +1 for space
  });
  sentenceMap[num] = map;
  return map;
}

function startHighlightTracking(num) {
  stopHighlightTracking();
  const map = buildSentenceMap(num);
  if (map.length === 0) return;
  
  const totalChars = map[map.length - 1].charEnd;
  let lastIdx = -1;
  
  function tick() {
    if (!currentAudio || currentSlide !== num) {
      stopHighlightTracking();
      return;
    }
    const progress = currentAudio.duration > 0 ? currentAudio.currentTime / currentAudio.duration : 0;
    // Map progress (0..1) to character position
    const charPos = progress * totalChars;
    // Find matching sentence
    let idx = 0;
    for (let i = map.length - 1; i >= 0; i--) {
      if (charPos >= map[i].charStart) {
        idx = i;
        break;
      }
    }
    if (idx !== lastIdx) {
      // Remove old
      if (lastIdx >= 0 && map[lastIdx]) map[lastIdx].el.classList.remove('active');
      // Add new
      map[idx].el.classList.add('active');
      // Scroll into view if needed
      map[idx].el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      lastIdx = idx;
    }
    highlightRAF = requestAnimationFrame(tick);
  }
  
  highlightRAF = requestAnimationFrame(tick);
}

function stopHighlightTracking() {
  if (highlightRAF) {
    cancelAnimationFrame(highlightRAF);
    highlightRAF = null;
  }
}

function clearHighlights(num) {
  stopHighlightTracking();
  document.querySelectorAll('#flow-' + num + ' .sentence.active').forEach(el => el.classList.remove('active'));
}

function togglePlay(num) {
  const btn = document.getElementById('play-btn-' + num);
  const card = document.getElementById('slide-' + num);
  
  if (currentAudio && currentSlide === num && !currentAudio.paused) {
    // Pause current
    currentAudio.pause();
    stopHighlightTracking();
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Play';
    btn.classList.remove('playing');
    card.classList.remove('playing');
    return;
  }
  
  // Stop any existing playback
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    if (currentSlide) {
      const oldBtn = document.getElementById('play-btn-' + currentSlide);
      if (oldBtn) {
        oldBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Play';
        oldBtn.classList.remove('playing');
      }
      const oldCard = document.getElementById('slide-' + currentSlide);
      if (oldCard) oldCard.classList.remove('playing');
      clearHighlights(currentSlide);
    }
  }
  
  // Start new playback
  const audioPath = getAudioPath(num);
  currentAudio = new Audio(audioPath);
  currentAudio.playbackRate = playbackRate;
  currentSlide = num;
  
  currentAudio.onloadeddata = () => {
    currentAudio.play().catch(e => console.warn('Playback error:', e));
  };
  
  currentAudio.onplay = () => {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause';
    btn.classList.add('playing');
    card.classList.add('playing');
    // Auto-expand
    card.classList.add('expanded');
    // Start sentence tracking
    startHighlightTracking(num);
  };
  
  currentAudio.onended = () => {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Play';
    btn.classList.remove('playing');
    card.classList.remove('playing');
    clearHighlights(num);
    currentAudio = null;
    currentSlide = null;
  };
  
  currentAudio.onpause = () => {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Play';
    btn.classList.remove('playing');
    card.classList.remove('playing');
    stopHighlightTracking();
  };
  
  currentAudio.onerror = () => {
    btn.innerHTML = '⚠️ No audio';
    btn.classList.remove('playing');
    card.classList.remove('playing');
    stopHighlightTracking();
    currentAudio = null;
    currentSlide = null;
    // Auto-revert button text after 2 seconds
    setTimeout(() => {
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Play';
    }, 2000);
  };
  
  // Load
  currentAudio.load();
}

// Speed control
// Multi-voice support
let voiceManifest = null;
let currentVoice = "";  // "" = default (audio/ folder), otherwise "Emma", "Guy", etc.

async function loadVoiceManifest() {
  try {
    const resp = await fetch('audio/voice_manifest.json');
    if (resp.ok) {
      voiceManifest = await resp.json();
      const selector = document.getElementById('voiceSelector');
      const voiceNames = Object.keys(voiceManifest);
      if (voiceNames.length > 0) {
        selector.innerHTML = '<option value="">Default</option>' +
          voiceNames.map(v => `<option value="${v}">${voiceManifest[v].name}</option>`).join('');
        document.getElementById('voiceControl').style.display = 'flex';
      }
    }
  } catch(e) {
    // No voice manifest — single voice mode, selector stays hidden
  }
}

function getAudioBase() {
  if (currentVoice && voiceManifest && voiceManifest[currentVoice]) {
    return 'audio/' + voiceManifest[currentVoice].dir + '/';
  }
  return 'audio/';
}

// Rebuild audio path function
function getAudioPath(num) {
  return getAudioBase() + 'Slide' + String(num).padStart(2,'0') + '_连贯全文.mp3';
}

document.addEventListener('DOMContentLoaded', () => {
  buildPage();
  loadVoiceManifest();
  
  const slider = document.getElementById('speedSlider');
  const label = document.getElementById('speedLabel');
  slider.addEventListener('input', () => {
    playbackRate = parseFloat(slider.value);
    label.textContent = playbackRate.toFixed(2) + 'x';
    if (currentAudio) {
      currentAudio.playbackRate = playbackRate;
    }
  });
  
  const voiceSelector = document.getElementById('voiceSelector');
  voiceSelector.addEventListener('change', () => {
    const wasPlaying = currentAudio && !currentAudio.paused;
    const wasSlide = currentSlide;
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
      clearHighlights(currentSlide);
      const oldBtn = document.getElementById('play-btn-' + currentSlide);
      if (oldBtn) {
        oldBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Play';
        oldBtn.classList.remove('playing');
      }
      const oldCard = document.getElementById('slide-' + currentSlide);
      if (oldCard) oldCard.classList.remove('playing');
    }
    currentVoice = voiceSelector.value;
    currentSlide = null;
    if (wasPlaying && wasSlide) {
      setTimeout(() => togglePlay(wasSlide), 100);
    }
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
    e.preventDefault();
    const delta = e.key === 'ArrowRight' ? 1 : -1;
    if (currentSlide) {
      const nextNum = currentSlide + delta;
      if (nextNum >= 1 && nextNum <= SLIDES.length) {
        togglePlay(nextNum);
      }
    }
  }
  if (e.key === ' ') {
    e.preventDefault();
    if (currentSlide) {
      togglePlay(currentSlide);
    }
  }
});
</script>
</body>
</html>
